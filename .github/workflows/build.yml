name: Build and Publish

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22.x'

    - name: Build executable
      run: go build -o ./publish/oda.exe main.go

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: oda-win-x64
        path: ./publish/oda.exe
        retention-days: 7
